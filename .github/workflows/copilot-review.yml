name: Request Copilot Code Review

# Formally requests Copilot as a reviewer on every PR. This triggers GitHub's
# dynamic `copilot-pull-request-reviewer` status check — required by the AAA
# branch-protection ruleset (16125109) for merge.
#
# Uses the GraphQL `requestReviews` mutation with `botIds` because Copilot is
# a Bot, not a User, and `gh pr edit --add-reviewer Copilot` /
# `requestReviewsByLogin` cannot resolve it (silent fail with GraphQL error
# "Could not resolve user with login 'copilot'"). See 2026-05-21 debug session.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  pull-requests: write

jobs:
  request-copilot-review:
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NODE: ${{ github.event.pull_request.node_id }}
        run: |
          # Copilot reviewer bot — stable globally (verified 2026-05-21).
          BOT_NODE="BOT_kgDOCnlnWA"
          gh api graphql -f query='
            mutation ($pr: ID!, $botId: ID!) {
              requestReviews(input: {pullRequestId: $pr, botIds: [$botId], union: true}) {
                pullRequest { number }
              }
            }' -F pr="$PR_NODE" -F botId="$BOT_NODE" \
          || echo "::warning::Could not add Copilot reviewer — ensure Copilot Code Review is enabled at https://github.com/organizations/Automation-Architecture/settings/copilot/policies"
