name: Auto-Merge when Checks Green

# Squash-merges a PR once all check-runs on the HEAD SHA complete with no failures.
# Uses workflow_run (not check_suite) because GitHub does not emit check_suite
# events for GITHUB_TOKEN-run CI workflows. workflow_run is always emitted.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: auto-merge-${{ github.repository }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  auto-merge:
    if: github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SHA="${{ github.event.workflow_run.head_sha }}"
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          if [ -z "$PR_NUMBER" ]; then echo "No open PR for SHA $SHA — nothing to merge."; exit 0; fi
          echo "PR #$PR_NUMBER  HEAD $SHA"
          CHECK_RUNS=$(gh api "/repos/$REPO/commits/$SHA/check-runs" --paginate --jq '.check_runs[]' | jq -s '.')
          TOTAL=$(echo "$CHECK_RUNS" | jq 'length')
          PENDING=$(echo "$CHECK_RUNS" | jq '[.[] | select(.status != "completed")] | length')
          FAILED=$(echo "$CHECK_RUNS" | jq '[.[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled" or .conclusion == "action_required")] | length')
          if [ "$TOTAL" -eq 0 ]; then echo "No check-runs for $SHA — not merging."; exit 0; fi
          if [ "$PENDING" -gt 0 ]; then echo "$PENDING check(s) still pending — waiting for next trigger."; exit 0; fi
          if [ "$FAILED" -gt 0 ]; then echo "$FAILED check(s) failed — not merging."; exit 0; fi
          echo "All checks green. Merging PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --squash --delete-branch --repo "$REPO" && exit 0
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch --repo "$REPO" && exit 0
          echo "::warning::Both merge attempts failed for PR #$PR_NUMBER."
          exit 0
