<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>AAA Internal · Sign in</title>
    <style>
      :root {
        --teal: #004d43;
        --lime: #e6ff2b;
        --cream: #f9f7f2;
        --body: #636363;
        --gray: #898a8d;
        --divider: #d8d8d8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--cream);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #010101;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: #fff;
        border: 1px solid var(--divider);
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 32px;
      }
      .kicker {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--gray);
      }
      h1 { font-size: 20px; color: var(--teal); margin: 4px 0 0; }
      .sub { font-size: 14px; color: var(--body); margin-top: 8px; }
      button, input {
        font-family: inherit;
        font-size: 14px;
      }
      .btn {
        width: 100%;
        border-radius: 10px;
        padding: 11px;
        cursor: pointer;
        border: 1px solid var(--divider);
        background: #fff;
        transition: background 0.15s;
        margin-top: 16px;
      }
      .btn:hover { background: var(--cream); }
      .btn-primary {
        background: var(--teal);
        color: #fff;
        border: none;
        font-weight: 600;
      }
      .btn-primary:hover { opacity: 0.9; background: var(--teal); }
      .btn:disabled { opacity: 0.5; cursor: default; }
      .sep { display: flex; align-items: center; gap: 12px; margin: 18px 0; }
      .sep hr { flex: 1; border: none; border-top: 1px solid var(--divider); }
      .sep span { font-size: 12px; color: var(--gray); }
      input[type="email"] {
        width: 100%;
        border: 1px solid var(--divider);
        border-radius: 10px;
        padding: 11px;
        margin-top: 4px;
      }
      input[type="email"]:focus {
        outline: none;
        border-color: var(--teal);
        box-shadow: 0 0 0 2px rgba(0, 77, 67, 0.2);
      }
      .msg { font-size: 13px; margin-top: 16px; border-radius: 10px; padding: 12px; }
      .msg-ok { color: var(--teal); background: rgba(230, 255, 43, 0.3); }
      .msg-err { color: #b00020; background: #fdecea; }
      .hidden { display: none; }
      .foot { font-size: 11px; color: var(--gray); margin-top: 20px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="kicker">Automation Architecture</div>
      <h1>AAA Internal · Sign in</h1>
      <p class="sub">Internal tool — authorized access only.</p>

      <div id="signin">
        <form id="magic">
          <input
            id="email"
            type="email"
            required
            placeholder="you@automationarchitecture.ai"
            autocomplete="email"
          />
          <button class="btn btn-primary" id="send" type="submit">
            Email me a sign-in link
          </button>
        </form>
      </div>

      <div id="forbidden" class="hidden">
        <div class="msg msg-err">
          This account isn’t authorized for the founder view. Sign in with an
          authorized account.
        </div>
        <button class="btn" id="switch">Sign out &amp; use another account</button>
      </div>

      <div id="status" class="msg hidden"></div>
      <p class="foot">Access is gated at the edge — authorized emails only.</p>
    </div>

    <script type="module">
      import { createBrowserClient } from "https://esm.sh/@supabase/ssr@0.10.3";

      const SUPABASE_URL = "https://qmdblnaqpylbnufvarcu.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZGJsbmFxcHlsYm51ZnZhcmN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjc5NjQsImV4cCI6MjA5Njg0Mzk2NH0.MykVoRstXhS7NUdq55rEt0HnsLPartu3wX1kt8DbI5A";
      const supabase = createBrowserClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const params = new URLSearchParams(location.search);
      const $ = (id) => document.getElementById(id);
      const status = $("status");
      function show(el) { el.classList.remove("hidden"); }
      function hide(el) { el.classList.add("hidden"); }
      function setStatus(text, ok) {
        status.textContent = text;
        status.className = "msg " + (ok ? "msg-ok" : "msg-err");
        show(status);
      }

      if (params.get("error") === "forbidden") {
        hide($("signin"));
        show($("forbidden"));
      } else if (params.get("error") === "auth") {
        setStatus("Sign-in failed — please try again.", false);
      } else {
        // Already signed in (and refreshable)? Bounce to the dashboard; the edge
        // gate re-checks the allowlist. Skipped when an error param is present to
        // avoid a redirect loop on the forbidden case.
        supabase.auth.getSession().then(({ data }) => {
          if (data.session) location.replace("/");
        });
      }

      $("magic").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = $("email").value.trim();
        $("send").disabled = true;
        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: location.origin + "/auth/callback" },
        });
        $("send").disabled = false;
        if (error) setStatus(error.message, false);
        else setStatus("Check your inbox — the sign-in link is on its way.", true);
      });

      $("switch").addEventListener("click", async () => {
        await supabase.auth.signOut();
        location.href = "/login";
      });
    </script>
  </body>
</html>
